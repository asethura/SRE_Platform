# TEMPLATE ONLY. Do not `kubectl apply -f` this file and do not commit it
# with real values — it is intentionally NOT listed in kustomization.yaml's
# resources so `kubectl apply -k` never creates a fake secret from it.
#
# Create the real secret imperatively instead, e.g. (in-cluster Postgres,
# see postgres.yaml — POSTGRES_USER/PASSWORD/DB must match DATABASE_URL):
#
#   kubectl create secret generic sre-secrets -n sre-platform \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=POSTGRES_USER='sre' \
#     --from-literal=POSTGRES_PASSWORD='<generate-one>' \
#     --from-literal=POSTGRES_DB='sre' \
#     --from-literal=DATABASE_URL='postgresql+psycopg://sre:<same-password>@postgres:5432/sre' \
#     --from-literal=CONFLUENCE_MCP_TOKEN='...'
#
# Or store it in your usual secrets manager (Vault, External Secrets
# Operator, Sealed Secrets, SOPS, etc.) and let that create the
# `sre-secrets` object in the `sre-platform` namespace.
apiVersion: v1
kind: Secret
metadata:
  name: sre-secrets
  namespace: sre-platform
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  POSTGRES_USER: "sre"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "sre"
  # Host "postgres" is the in-cluster Service from postgres.yaml — must
  # stay in the same namespace, and user/password/db must match the three
  # POSTGRES_* keys above.
  DATABASE_URL: "postgresql+psycopg://sre:REPLACE_ME@postgres:5432/sre"
  CONFLUENCE_MCP_TOKEN: "REPLACE_ME"
