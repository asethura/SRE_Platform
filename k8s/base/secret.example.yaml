# TEMPLATE ONLY. Do not `kubectl apply -f` this file and do not commit it
# with real values — it is intentionally NOT listed in kustomization.yaml's
# resources so `kubectl apply -k` never creates a fake secret from it.
#
# Create the real secret imperatively instead, e.g.:
#
#   kubectl create secret generic sre-secrets -n sre-platform \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=DATABASE_URL='postgresql+psycopg://user:pass@host:5432/sre' \
#     --from-literal=CONFLUENCE_MCP_TOKEN='...'
#
# Or store it in your usual secrets manager (Vault, External Secrets
# Operator, Sealed Secrets, SOPS, etc.) and let that create the
# `sre-secrets` object in the `sre-platform` namespace.
apiVersion: v1
kind: Secret
metadata:
  name: sre-secrets
  namespace: sre-platform
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql+psycopg://user:pass@host:5432/sre"
  CONFLUENCE_MCP_TOKEN: "REPLACE_ME"
