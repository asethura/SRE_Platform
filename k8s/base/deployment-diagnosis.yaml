apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-diagnosis
  namespace: sre-platform
  labels:
    app: sre-platform
    agent: diagnosis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-platform
      agent: diagnosis
  template:
    metadata:
      labels:
        app: sre-platform
        agent: diagnosis
    spec:
      containers:
        - name: diagnosis
          image: sre-platform:latest
          args: ["diagnosis"]
          envFrom:
            - configMapRef:
                name: sre-config
            - secretRef:
                name: sre-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test $(( $(date +%s) - $(stat -c %Y /tmp/sre-agent-healthy) )) -lt 300"
            initialDelaySeconds: 20
            periodSeconds: 60
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: tmp
          emptyDir: {}
