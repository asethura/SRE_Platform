# Non-secret configuration shared by all four agent Deployments.
# ANTHROPIC_API_KEY, DATABASE_URL, and CONFLUENCE_MCP_TOKEN are secrets —
# see secret.example.yaml for the fields and the `kubectl create secret`
# command to actually create them (never commit real values here).
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-config
  namespace: sre-platform
data:
  SRE_MODEL: "claude-sonnet-4-6"
  SRE_POLL_INTERVAL: "5"
  SRE_HEALTHCHECK_FILE: "/tmp/sre-agent-healthy"
  # Confluence MCP server endpoint (not sensitive — it's just a URL).
  CONFLUENCE_MCP_URL: "https://your-confluence-mcp-server.example.com/mcp"
  # "stub" replays the same fixed demo tickets forever — fine for a smoke
  # test, wrong for a real cluster. "jira" pulls real open requests from
  # Jira Cloud Service Management (see JIRA_* keys below and
  # integrations/itsm.py:JiraServiceManagementITSMClient) — needs
  # JIRA_EMAIL/JIRA_API_TOKEN in sre-secrets too.
  SRE_ITSM_CLIENT: "jira"
  # Only read when SRE_ITSM_CLIENT=jira. JIRA_BASE_URL is your Atlassian
  # Cloud site, e.g. "https://yourcompany.atlassian.net". Set
  # JIRA_PROJECT_KEY for the default "all open requests in this project"
  # query, or override entirely with JIRA_JQL for anything more specific.
  JIRA_BASE_URL: "https://asethura.atlassian.net"
  JIRA_PROJECT_KEY: "ZPM"
